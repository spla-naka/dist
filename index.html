<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Xマッチ記録アプリ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #f0f0f0; }
    .card { background: #2a2a2a !important; border-color: #3a3a3a !important; }
    .stat { background: #2a2a2a !important; }
    input, select { background: #2a2a2a !important; color: #f0f0f0 !important; border-color: #444 !important; }
    .row { background: #2a2a2a !important; }
    .tab-inactive { background: #2a2a2a !important; color: #aaa !important; }
    .rule-btn-off { background: #2a2a2a !important; color: #ccc !important; }
    .res-btn-off { background: #2a2a2a !
  #app { max-width: 680px; margin: 0 auto; padding: 20px 16px 60px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; font-size: 15px; font-weight: 400; transition: all .15s; }
  .tab-active { font-weight: 500; }
  .tab-inactive { background: #f0f0f0; color: #666; }
  label.lbl { display: block; font-size: 13px; color: #666; margin-bottom: 8px; }
  .section { margin-bottom: 20px; }
  .grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3s { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .rule-btn { padding: 10px 4px; font-size: 14px; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; transition: all .15s; }
  .rule-btn-off { background: #f0f0f0; color: #333; }
  .res-btn { padding: 10px; font-size: 15px; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; transition: all .15s; }
  .res-btn-off { background: #f0f0f0; }
  .xp-row { display: flex; align-items: center; gap: 12px; }
  input[type=number], select { padding: 10px 12px; font-size: 16px; border-radius: 8px; border: 1px solid #ddd; width: 100%; }
  .submit-btn { width: 100%; padding: 14px; font-size: 16px; font-weight: 500; border-radius: 8px; border: none; cursor: pointer; transition: opacity .2s; }
  .row { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; margin-bottom: 6px; background: #f0f0f0; border-radius: 8px; font-size: 14px; }
  .stat { background: #f0f0f0; border-radius: 8px; padding: 12px; text-align: center; }
  .stat-lbl { font-size: 11px; color: #888; margin-bottom: 4px; }
  .stat-val { font-size: 20px; font-weight: 500; }
  .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 12px 16px; }
  .filter-btn { padding: 5px 12px; font-size: 13px; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; transition: all .15s; }
  .chart-wrap { width: 100%; height: 280px; margin-bottom: 20px; }
  .records { max-height: 240px; overflow-y: auto; margin-top: 8px; }
  .mental { background: #fff8e1; border: 1px solid #ffe082; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; color: #856404; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
  .close-btn { font-size: 12px; padding: 3px 8px; border-radius: 6px; border: 1px solid #ffe082; background: transparent; cursor: pointer; color: #856404; }
  .archive-btn { font-size: 13px; color: #888; padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; background: transparent; cursor: pointer; margin-top: 16px; }
  .overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(124,58,237,0.93); display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeInOut 3.5s ease forwards; pointer-events: none; }
  .overlay-title { font-size: 44px; font-weight: 700; color: #fff; text-align: center; line-height: 1.3; animation: pulse 0.8s infinite; }
  .overlay-emoji { font-size: 40px; margin-top: 16px; }
  .overlay-sub { color: rgba(255,255,255,.85); font-size: 18px; margin-top: 12px; }
  @keyframes fadeInOut { 0%{opacity:0} 10%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  .sep { border-top: 1px solid #e5e5e5; padding-top: 16px; margin-top: 16px; }
  .sec-lbl { font-size: 13px; color: #888; margin-bottom: 10px; }
  .diff { font-size: 20px; font-weight: 500; min-width: 70px; text-align: right; }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .empty { color: #888; text-align: center; padding: 40px 0; font-size: 15px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const { useState, useEffect, useRef } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

const RULES = ["エリア", "ヤグラ", "ホコ", "アサリ"];
const RESULTS = [
  { label: "3-0", w: 3, l: 0 }, { label: "3-1", w: 3, l: 1 }, { label: "3-2", w: 3, l: 2 },
  { label: "2-3", w: 2, l: 3 }, { label: "1-3", w: 1, l: 3 }, { label: "0-3", w: 0, l: 3 },
];
const RULE_COLORS = { "エリア": "#7c3aed", "ヤグラ": "#0ea5e9", "ホコ": "#f59e0b", "アサリ": "#10b981" };

function getCurrentSeasonId() {
  const now = new Date();
  const s = Math.floor(now.getMonth() / 3);
  return `${now.getFullYear()}-S${s + 1}`;
}

function getSeasonLabel(id) {
  const [y, s] = id.split("-S");
  const starts = ["1月", "4月", "7月", "10月"];
  const ends = ["3月", "6月", "9月", "12月"];
  const idx = parseInt(s) - 1;
  if (isNaN(idx) || idx < 0 || idx > 3) return id;
  return `${y}年 ${starts[idx]}〜${ends[idx]}`;
}

function loadSeasons() {
  try { const v = localStorage.getItem("xmatch_seasons"); return v ? JSON.parse(v) : {}; } catch { return {}; }
}

function saveSeasons(data) {
  try { localStorage.setItem("xmatch_seasons", JSON.stringify(data)); } catch {}
}

function App() {
  const [tab, setTab] = useState("record");
  const [rule, setRule] = useState(null);
  const [result, setResult] = useState(null);
  const [xp, setXp] = useState("");
  const [seasons, setSeasons] = useState(() => loadSeasons());
  const [currentSeason, setCurrentSeason] = useState(getCurrentSeasonId());
  const [viewSeason, setViewSeason] = useState(getCurrentSeasonId());
  const [showHighest, setShowHighest] = useState(false);
  const [showMental, setShowMental] = useState(false);
  const [filterRule, setFilterRule] = useState("ALL");
  const [saved, setSaved] = useState(false);
  const flashTimer = useRef(null);

  const save = (ns) => { setSeasons(ns); saveSeasons(ns); };
  const getSets = (sid) => seasons[sid] || [];
  const currentSets = getSets(currentSeason);

  const lastXpForRule = (r) => {
    const found = [...currentSets].reverse().find(x => x.rule === r);
    return found ? found.xpAfter : null;
  };
  const prevXp = () => rule ? lastXpForRule(rule) : null;
  const diff = () => { const p = prevXp(); const v = parseInt(xp); if (!p || isNaN(v)) return null; return v - p; };

  const handleSubmit = () => {
    if (!rule || !result || xp === "") return;
    const v = parseInt(xp);
    if (isNaN(v)) return;
    const p = prevXp();
    const entry = { rule, w: result.w, l: result.l, xpAfter: v, xpDiff: p !== null ? v - p : null, ts: Date.now() };
    const updated = { ...seasons, [currentSeason]: [...currentSets, entry] };
    const prevHighest = Math.max(...currentSets.filter(x => x.rule === rule).map(x => x.xpAfter), -Infinity);
    const isHighest = v > prevHighest && currentSets.some(x => x.rule === rule);
    save(updated);
    setRule(null); setResult(null); setXp(""); setSaved(true);
    setTimeout(() => setSaved(false), 1500);
    if (isHighest) {
      setShowHighest(true);
      if (flashTimer.current) clearTimeout(flashTimer.current);
      flashTimer.current = setTimeout(() => setShowHighest(false), 3500);
    }
    const sets = updated[currentSeason];
    const recent = sets.slice(-3);
    setShowMental(recent.length === 3 && recent.every(s => (s.xpDiff ?? 0) < 0));
  };

  const handleNewSeason = () => {
    if (!confirm(`現在のシーズン (${getSeasonLabel(currentSeason)}) をアーカイブして新しいシーズンを開始しますか？`)) return;
    const newId = getCurrentSeasonId() + `-${Date.now()}`;
    setCurrentSeason(newId);
    setViewSeason(newId);
  };

  const allSeasonIds = [...new Set([...Object.keys(seasons), currentSeason])].sort().reverse();
  const viewSets = getSets(viewSeason);

  const stats = () => {
    if (!viewSets.length) return null;
    const totalW = viewSets.reduce((a, s) => a + s.w, 0);
    const totalL = viewSets.reduce((a, s) => a + s.l, 0);
    const total = totalW + totalL;
    const highestXp = Math.max(...viewSets.map(s => s.xpAfter));
    const latestXp = {}, startXp = {};
    [...viewSets].reverse().forEach(s => { if (!latestXp[s.rule]) latestXp[s.rule] = s.xpAfter; });
    viewSets.forEach(s => { if (!startXp[s.rule]) startXp[s.rule] = s.xpAfter; });
    return { totalW, totalL, total, highestXp, latestXp, startXp, winRate: total > 0 ? Math.round((totalW / total) * 100) : 0 };
  };

  const chartData = () => {
    const ruleCount = {};
    return viewSets.map((s, i) => {
      ruleCount[s.rule] = (ruleCount[s.rule] || 0) + 1;
      const pt = { name: `${ruleCount[s.rule]}`, set: i + 1 };
      pt[s.rule] = s.xpAfter;
      return pt;
    });
  };

  const filteredData = () => {
    if (filterRule === "ALL") return chartData();
    return viewSets.filter(s => s.rule === filterRule).map((s, i) => ({ name: `${i + 1}`, [s.rule]: s.xpAfter }));
  };

  const d = diff();
  const st = stats();

  return React.createElement("div", null,
    React.createElement("h1", null, "Xマッチ 記録アプリ"),
    React.createElement("h2", { className: "sr-only" }, "Xマッチ記録・振り返りアプリ"),

    showHighest && React.createElement("div", { className: "overlay" },
      React.createElement("div", { className: "overlay-title" }, "HIGHEST XP\nUPDATED!"),
      React.createElement("div", { className: "overlay-emoji" }, "🎉"),
      React.createElement("div", { className: "overlay-sub" }, "シーズン最高XP更新おめでとう！")
    ),

    showMental && React.createElement("div", { className: "mental" },
      React.createElement("span", null, "☕ 直近3セット連続マイナスです。一度休憩して、散歩（ステージ確認）かメモを見直そう！"),
      React.createElement("button", { className: "close-btn", onClick: () => setShowMental(false) }, "閉じる")
    ),

    React.createElement("div", { className: "tabs" },
      ["record", "dash"].map((id, i) =>
        React.createElement("button", {
          key: id, className: `tab ${tab === id ? "tab-active" : "tab-inactive"}`,
          style: tab === id ? { background: "#ede9fe", color: "#5b21b6", border: "1px solid #c4b5fd" } : {},
          onClick: () => setTab(id)
        }, ["記録する", "振り返り"][i])
      )
    ),

    tab === "record" && React.createElement("div", null,
      React.createElement("p", { style: { fontSize: 13, color: "#888", marginBottom: 16 } },
        "シーズン: ", React.createElement("strong", null, getSeasonLabel(currentSeason))
      ),

      React.createElement("div", { className: "section" },
        React.createElement("label", { className: "lbl" }, "ルール"),
        React.createElement("div", { className: "grid4" },
          RULES.map(r =>
            React.createElement("button", {
              key: r, className: `rule-btn ${rule === r ? "" : "rule-btn-off"}`,
              style: rule === r ? { background: RULE_COLORS[r], color: "#fff", border: `1px solid ${RULE_COLORS[r]}`, fontWeight: 500 } : {},
              onClick: () => setRule(r)
            }, r)
          )
        )
      ),

      React.createElement("div", { className: "section" },
        React.createElement("label", { className: "lbl" }, "戦績"),
        React.createElement("div", { className: "grid3" },
          RESULTS.map(res => {
            const win = res.w > res.l;
            const sel = result?.label === res.label;
            return React.createElement("button", {
              key: res.label, className: `res-btn ${sel ? "" : "res-btn-off"}`,
              style: sel
                ? { background: win ? "#10b981" : "#ef4444", color: "#fff", border: `1px solid ${win ? "#10b981" : "#ef4444"}`, fontWeight: 500 }
                : { color: win ? "#059669" : "#dc2626" },
              onClick: () => setResult(res)
            }, res.label);
          })
        )
      ),

      React.createElement("div", { className: "section" },
        React.createElement("label", { className: "lbl" },
          "セット終了後のXP",
          rule && prevXp() !== null && React.createElement("span", { style: { marginLeft: 8, color: "#aaa" } }, `前回: ${prevXp()}`)
        ),
        React.createElement("div", { className: "xp-row" },
          React.createElement("input", { type: "number", value: xp, onChange: e => setXp(e.target.value), placeholder: "例: 2150" }),
          d !== null && React.createElement("span", { className: "diff", style: { color: d >= 0 ? "#10b981" : "#ef4444" } },
            (d >= 0 ? "+" : "") + d
          )
        )
      ),

      React.createElement("button", {
        className: "submit-btn",
        disabled: !rule || !result || xp === "",
        style: { background: (!rule || !result || xp === "") ? "#e5e5e5" : "#7c3aed", color: (!rule || !result || xp === "") ? "#aaa" : "#fff" },
        onClick: handleSubmit
      }, saved ? "保存しました ✓" : "記録する"),

      currentSets.length > 0 && React.createElement("div", { style: { marginTop: 24 } },
        React.createElement("div", { className: "sec-lbl" }, "直近の記録"),
        [...currentSets].reverse().slice(0, 5).map((s, i) =>
          React.createElement("div", { key: i, className: "row" },
            React.createElement("span", { style: { color: RULE_COLORS[s.rule], fontWeight: 500, width: 48 } }, s.rule),
            React.createElement("span", { style: { color: s.w > s.l ? "#059669" : "#dc2626", width: 40 } }, `${s.w}-${s.l}`),
            React.createElement("span", { style: { fontWeight: 500 } }, s.xpAfter.toLocaleString()),
            s.xpDiff !== null && React.createElement("span", { style: { color: s.xpDiff >= 0 ? "#10b981" : "#ef4444", width: 56, textAlign: "right" } },
              (s.xpDiff >= 0 ? "+" : "") + s.xpDiff
            )
          )
        )
      ),

      React.createElement("div", { className: "sep" },
        React.createElement("button", { className: "archive-btn", onClick: handleNewSeason }, "シーズンをアーカイブして新シーズン開始")
      )
    ),

    tab === "dash" && React.createElement("div", null,
      React.createElement("div", { style: { marginBottom: 16 } },
        React.createElement("label", { className: "lbl", style: { display: "inline", marginRight: 8 } }, "シーズン:"),
        React.createElement("select", { value: viewSeason, onChange: e => setViewSeason(e.target.value) },
          allSeasonIds.map(id =>
            React.createElement("option", { key: id, value: id },
              getSeasonLabel(id) + (id === currentSeason ? " (現在)" : "")
            )
          )
        )
      ),

      !st
        ? React.createElement("div", { className: "empty" }, "まだ記録がありません。記録タブからXマッチの結果を入力してください。")
        : React.createElement("div", null,
            React.createElement("div", { className: "grid3s" },
              [["トータルセット", st.total + "セット"], ["総勝率", st.winRate + "%"], ["シーズン最高XP", st.highestXp.toLocaleString()]].map(([lbl, val]) =>
                React.createElement("div", { key: lbl, className: "stat" },
                  React.createElement("div", { className: "stat-lbl" }, lbl),
                  React.createElement("div", { className: "stat-val" }, val)
                )
              )
            ),

            React.createElement("div", { className: "grid2", style: { marginBottom: 20 } },
              RULES.map(r => {
                const curr = st.latestXp[r], start = st.startXp[r];
                if (!curr) return null;
                const d2 = start !== undefined ? curr - start : null;
                return React.createElement("div", { key: r, className: "card" },
                  React.createElement("div", { style: { fontSize: 12, color: RULE_COLORS[r], fontWeight: 500, marginBottom: 4 } }, r),
                  React.createElement("div", { style: { fontSize: 22, fontWeight: 500 } }, curr.toLocaleString()),
                  d2 !== null && React.createElement("div", { style: { fontSize: 12, color: d2 >= 0 ? "#10b981" : "#ef4444", marginTop: 2 } },
                    "開始比 " + (d2 >= 0 ? "+" : "") + d2
                  )
                );
              })
            ),

            React.createElement("div", { className: "filter-row" },
              ["ALL", ...RULES].map(r =>
                React.createElement("button", {
                  key: r, className: "filter-btn",
                  style: filterRule === r
                    ? { background: r === "ALL" ? "#7c3aed" : RULE_COLORS[r], color: "#fff", border: "none" }
                    : { background: "#f0f0f0", color: "#555" },
                  onClick: () => setFilterRule(r)
                }, r)
              )
            ),

            React.createElement("div", { className: "chart-wrap" },
              React.createElement(ResponsiveContainer, { width: "100%", height: "100%" },
                React.createElement(LineChart, { data: filteredData(), margin: { top: 8, right: 16, left: 0, bottom: 8 } },
                  React.createElement(CartesianGrid, { strokeDasharray: "3 3", stroke: "rgba(128,128,128,0.15)" }),
                  React.createElement(XAxis, { dataKey: "name", tick: { fontSize: 11 } }),
                  React.createElement(YAxis, { tick: { fontSize: 11 }, domain: ["auto", "auto"] }),
                  React.createElement(Tooltip, { formatter: v => v?.toLocaleString(), contentStyle: { fontSize: 13, borderRadius: 8 } }),
                  React.createElement(Legend, { wrapperStyle: { fontSize: 13 } }),
                  (filterRule === "ALL" ? RULES : [filterRule]).map(r =>
                    React.createElement(Line, { key: r, type: "monotone", dataKey: r, stroke: RULE_COLORS[r], dot: { r: 3 }, activeDot: { r: 5 }, connectNulls: true, strokeWidth: 2 })
                  )
                )
              )
            ),

            React.createElement("div", { className: "sec-lbl" }, "全記録"),
            React.createElement("div", { className: "records" },
              [...viewSets].reverse().map((s, i) =>
                React.createElement("div", { key: i, className: "row" },
                  React.createElement("span", { style: { color: RULE_COLORS[s.rule], fontWeight: 500, width: 48 } }, s.rule),
                  React.createElement("span", { style: { color: s.w > s.l ? "#059669" : "#dc2626", width: 36 } }, `${s.w}-${s.l}`),
                  React.createElement("span", { style: { fontWeight: 500 } }, s.xpAfter.toLocaleString()),
                  s.xpDiff !== null && React.createElement("span", { style: { color: s.xpDiff >= 0 ? "#10b981" : "#ef4444", width: 52, textAlign: "right" } },
                    (s.xpDiff >= 0 ? "+" : "") + s.xpDiff
                  )
                )
              )
            )
          )
    )
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
</script>
</body>
</html>
